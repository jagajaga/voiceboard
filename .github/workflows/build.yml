name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > voiceboard.jks
            echo "KEYSTORE_PATH=$PWD/voiceboard.jks" >> $GITHUB_ENV
            echo "STORE_PASSWORD=$STORE_PASSWORD"     >> $GITHUB_ENV
            echo "KEY_PASSWORD=$KEY_PASSWORD"         >> $GITHUB_ENV
            echo "KEY_ALIAS=voiceboard"               >> $GITHUB_ENV
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk voiceboard.apk

      - name: Publish to GitHub Releases (latest)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest voiceboard.apk \
            --title "VoiceBoard — latest build" \
            --notes "Built from $(git log -1 --pretty='%h %s')" \
            --prerelease
