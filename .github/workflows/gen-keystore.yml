name: Generate & Store Keystore (run once)

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          keytool -genkeypair \
            -keystore voiceboard.jks \
            -alias voiceboard \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass voiceboard_store \
            -keypass voiceboard_key \
            -dname "CN=VoiceBoard,OU=Dev,O=jagajaga,L=Paris,ST=IDF,C=FR"

          B64=$(base64 -w 0 voiceboard.jks)

          gh secret set KEYSTORE_BASE64 --repo ${{ github.repository }} --body "$B64"
          gh secret set STORE_PASSWORD  --repo ${{ github.repository }} --body "voiceboard_store"
          gh secret set KEY_PASSWORD    --repo ${{ github.repository }} --body "voiceboard_key"

          echo "Done — keystore stored as secrets."
