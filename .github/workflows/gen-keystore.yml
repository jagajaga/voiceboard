name: Generate & Store Keystore (run once)

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -keystore voiceboard.jks \
            -alias voiceboard \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass voiceboard_store \
            -keypass voiceboard_store \
            -dname "CN=VoiceBoard,OU=Dev,O=jagajaga,L=Paris,ST=IDF,C=FR"
          base64 -w 0 voiceboard.jks > voiceboard.jks.b64
          echo "Keystore generated."

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: voiceboard.jks.b64
          retention-days: 1
